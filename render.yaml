# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → connect this repo → Render picks up render.yaml

services:
  - type: web
    name: compliance-scanner
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
