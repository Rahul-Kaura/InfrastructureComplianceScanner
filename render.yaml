# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → connect this repo → Render picks up render.yaml
#
# Use a Web Service (this file), not a Static Site — Next.js API routes (/api/scan) need a Node server.
# Example inventories live under examples/infrastructure/ (optional reference; scan API requires pasted JSON).
# Keep examples/infrastructure/ in the deployed repo (Docker copies that directory).

services:
  - type: web
    name: compliance-scanner
    runtime: node
    region: oregon
    plan: free
    branch: main
    # NODE_ENV=production during install makes npm ci skip devDependencies (TS, ESLint, Tailwind),
    # which breaks next build. --include=dev keeps them; Render sets NODE_ENV for runtime itself.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Set in Render dashboard (sync: false) — required for “Generate policy JSON”
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
